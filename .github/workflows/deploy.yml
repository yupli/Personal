# 与 SmilingWayne/me 同款：build → peaceiris 推 gh-pages（见对方 update.yml）
# MkDocs 输出 ./site；本仓库为 VitePress，输出 docs/.vitepress/dist
name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build
        run: npm run build

      - name: 确认入口文件存在
        run: |
          test -f docs/.vitepress/dist/index.html
          test -f docs/.vitepress/dist/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
