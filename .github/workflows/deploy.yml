# 推送到 gh-pages 分支，由「从分支发布」托管（不依赖 deploy-pages / github-pages 环境审批）
# 发布后请在仓库 Settings → Pages 选择 Branch: gh-pages, Folder: / (root)
name: Deploy VitePress

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build
        run: npm run build

      - name: 确认入口文件存在（避免空白部署）
        run: |
          test -f docs/.vitepress/dist/index.html
          test -f docs/.vitepress/dist/.nojekyll
          ls -la docs/.vitepress/dist | head -25

      - name: 推送到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          force_orphan: true
